<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSBJK Modern Mechanical Chronograph</title>

<style>
:root{
--steel1:#cfd8dc;
--steel2:#90a4ae;
--dial:#1e1e1e;
--accent:#ff3d00;
--text:#ffffff;
}

body{
margin:0;
background:linear-gradient(135deg,#2c3e50,#000000);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
font-family:Segoe UI, sans-serif;
color:var(--text);
overflow:hidden;
}

/* Mac Style Clock */

.mac-clock{
position:fixed;
top:15px;
right:20px;
padding:10px 18px;
border-radius:12px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
box-shadow:0 8px 25px rgba(0,0,0,0.4);
font-size:14px;
letter-spacing:1px;
transition:0.3s;
}

.mac-clock:hover{
background:rgba(255,255,255,0.15);
}

/* Watch */

h1{
letter-spacing:4px;
margin-bottom:20px;
color:#ccc;
}

.watch{
width:360px;
height:360px;
border-radius:50%;
background:linear-gradient(145deg,var(--steel1),var(--steel2));
box-shadow:
inset -6px -6px 12px rgba(0,0,0,0.5),
inset 6px 6px 12px rgba(255,255,255,0.2),
0 20px 40px rgba(0,0,0,0.8);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
position:relative;
transition:0.1s;
}

.watch:active{
transform:scale(0.98);
}

.dial{
width:300px;
height:300px;
border-radius:50%;
background:radial-gradient(circle,#333,#111);
position:relative;
display:flex;
align-items:center;
justify-content:center;
box-shadow:inset 0 0 25px black;
}

.hand{
position:absolute;
width:3px;
height:130px;
background:var(--accent);
top:20px;
transform-origin:bottom center;
}

.center{
width:14px;
height:14px;
background:var(--accent);
border-radius:50%;
position:absolute;
}

.subdial{
width:70px;
height:70px;
border-radius:50%;
background:#222;
position:absolute;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
color:#ccc;
box-shadow:inset 0 0 10px black;
}

#minutes{ top:40px; left:115px; }
#hours{ bottom:40px; left:115px; }

.digital{
position:absolute;
bottom:20px;
font-size:16px;
}

/* Modern Buttons */

.controls{
margin-top:25px;
display:flex;
gap:15px;
}

button{
padding:10px 18px;
border-radius:25px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
color:white;
cursor:pointer;
font-weight:600;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

button:hover{
background:rgba(255,255,255,0.2);
transform:translateY(-2px);
}

/* Modern Lap Panel */

.laps{
margin-top:15px;
max-height:160px;
overflow-y:auto;
padding:10px 12px;
border-radius:15px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
box-shadow:inset 0 0 15px rgba(0,0,0,0.6);
scroll-behavior:smooth;
}

.laps div{
padding:8px 10px;
margin-bottom:6px;
border-radius:8px;
background:rgba(255,255,255,0.04);
transition:0.3s;
font-size:13px;
}

.laps div:hover{
background:rgba(255,255,255,0.12);
transform:translateX(3px);
}

/* Scrollbar */

.laps::-webkit-scrollbar{
width:6px;
}

.laps::-webkit-scrollbar-track{
background:transparent;
}

.laps::-webkit-scrollbar-thumb{
background:linear-gradient(#888,#555);
border-radius:10px;
}

.laps::-webkit-scrollbar-thumb:hover{
background:#aaa;
}

.stats{
font-size:13px;
opacity:0.8;
margin-top:10px;
}

footer{
margin-top:20px;
opacity:0.6;
font-size:13px;
}
</style>
</head>

<body>

<div class="mac-clock" id="macClock"></div>

<h1>STOP WATCH</h1>

<div class="watch" onclick="toggleStartPause()">
<div class="dial">
<div class="hand" id="secondHand"></div>
<div class="center"></div>
<div class="subdial" id="minutes">Min<br>0</div>
<div class="subdial" id="hours">Hr<br>0</div>
<div class="digital" id="display">00:00:00.000</div>
</div>
</div>

<div class="controls">
<button onclick="lap()">Lap</button>
<button onclick="reset()">Reset</button>
</div>

<div class="laps" id="laps"></div>

<div class="stats">
<p>Fastest: <span id="fastest">-</span></p>
<p>Slowest: <span id="slowest">-</span></p>
<p>Average: <span id="average">-</span></p>
</div>

<footer>
Modern Mechanical Edition © 2026 HSBJK Technologies
</footer>

<script>
let startTime, interval;
let elapsed=0;
let running=false;
let laps=[];
const hand=document.getElementById("secondHand");

function format(ms){
let msPart=ms%1000;
let s=Math.floor(ms/1000)%60;
let m=Math.floor(ms/60000)%60;
let h=Math.floor(ms/3600000);
return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(msPart).padStart(3,'0')}`;
}

function toggleStartPause(){
running?pause():start();
}

function start(){
running=true;
startTime=Date.now()-elapsed;
interval=setInterval(()=>{
elapsed=Date.now()-startTime;
updateUI();
},16);
}

function pause(){
running=false;
clearInterval(interval);
}

function reset(){
running=false;
clearInterval(interval);
elapsed=0;
laps=[];
document.getElementById("laps").innerHTML="";
updateStats();
updateUI();
}

function updateUI(){
document.getElementById("display").textContent=format(elapsed);
let sec=(elapsed/1000)%60;
hand.style.transform="rotate("+(sec*6)+"deg)";
document.getElementById("minutes").innerHTML="Min<br>"+Math.floor(elapsed/60000)%60;
document.getElementById("hours").innerHTML="Hr<br>"+Math.floor(elapsed/3600000);
}

function lap(){
if(!running) return;

laps.push(elapsed);

let div=document.createElement("div");
div.textContent="Lap "+laps.length+": "+format(elapsed);

const lapContainer=document.getElementById("laps");
lapContainer.appendChild(div);
lapContainer.scrollTop = lapContainer.scrollHeight;

updateStats();
}

function updateStats(){
if(laps.length===0){
fastest.textContent="-";
slowest.textContent="-";
average.textContent="-";
return;
}
let f=Math.min(...laps);
let s=Math.max(...laps);
let a=laps.reduce((x,y)=>x+y,0)/laps.length;
fastest.textContent=format(f);
slowest.textContent=format(s);
average.textContent=format(a);
}

/* Mac Date & Time */

function updateMacClock(){
let now=new Date();
let time=now.toLocaleTimeString();
let date=now.toDateString();
document.getElementById("macClock").innerHTML=date+" | "+time;
}
setInterval(updateMacClock,1000);
updateMacClock();

document.addEventListener("keydown",e=>{
if(e.code==="Space"){
toggleStartPause();
}
});
</script>

</body>
</html>
